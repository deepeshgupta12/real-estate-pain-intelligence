name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repi_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff pytest-timeout

      - name: Run linter (ruff)
        run: ruff check app/ --ignore E501 || echo "Linting warnings found"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/repi_db_test
          APP_ENV: test
          SCRAPER_ENABLE_LIVE_FETCH: "false"
          JWT_SECRET_KEY: test-secret-key-not-for-production
          INTELLIGENCE_ENABLE_LLM: "false"
          AGENT_ORCHESTRATOR_ENABLED: "false"
        run: pytest tests/ -v --tb=short --timeout=60 -x

  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint check
        run: npm run lint || echo "ESLint warnings found (non-blocking)"

      - name: TypeScript check
        run: npx tsc --noEmit || echo "TypeScript warnings found"

      - name: Next.js build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build

  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t repi-api:${{ github.sha }} apps/api/

      - name: Build Web image
        run: docker build -t repi-web:${{ github.sha }} apps/web/
